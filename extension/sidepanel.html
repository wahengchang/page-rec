<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Rec</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header id="header">
    <div id="status-row">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Ready</span>
      <span id="action-count">(0 actions)</span>
    </div>
    <div id="controls-row">
      <button id="start-btn" class="btn-start">Start recording</button>
      <button id="stop-btn" class="btn-stop hidden">Stop Recording</button>
      <button id="pause-btn" class="btn-pause hidden">Pause</button>
      <button id="new-btn" class="btn-new hidden">↺ New</button>
    </div>
  </header>

  <nav id="tabs" class="hidden">
    <button class="tab active" data-tab="timeline">Timeline</button>
    <button class="tab" data-tab="test-steps">Test Steps</button>
  </nav>

  <main id="tab-timeline" class="tab-content active">
    <ul id="action-list" aria-label="Captured actions"></ul>
    <p id="empty-msg">Click 'Start recording' and interact with the page. We'll capture your clicks, typing, and navigation.</p>
  </main>

  <main id="tab-test-steps" class="tab-content">
    <div id="steps-toolbar">
      <button id="reset-btn" title="Reset to original">↺ Reset</button>
    </div>
    <ol id="steps-list"></ol>
  </main>

  <footer id="footer-edit" class="hidden">
    <div class="footer-row">
      <button id="copy-code-btn" class="btn-primary">Copy Code</button>
      <button id="download-spec-btn" class="btn-ghost">Download .spec.js</button>
    </div>
  </footer>

  <div id="toast" class="toast hidden">Copied!</div>

  <script src="export.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
