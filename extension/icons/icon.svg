  <!-- Fold triangle -->
  <path d="M76 8 L76 32 L108 32" fill="#e2e8f0" stroke="#334155" stroke-width="3" stroke-linejoin="round"/>
  <!-- Text lines on page -->
  <rect x="36" y="48" width="40" height="4" rx="2" fill="#94a3b8"/>
  <rect x="36" y="60" width="56" height="4" rx="2" fill="#94a3b8"/>
  <rect x="36" y="72" width="48" height="4" rx="2" fill="#94a3b8"/>
  <!-- Red record dot (bottom-right, overlapping the page) -->
  <circle cx="92" cy="96" r="22" fill="#ef4444"/>
  <circle cx="92" cy="96" r="10" fill="#ffffff"/>
</svg>
