<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Rec</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header id="header">
    <div id="status-row">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Ready</span>
      <span id="action-count">(0 actions)</span>
      <button id="new-btn" class="btn-new hidden">▶ New Record</button>
    </div>
    <div id="controls-row">
      <button id="start-btn" class="btn-start">Start recording</button>
      <button id="stop-btn" class="btn-stop hidden">Stop Recording</button>
      <button id="pause-btn" class="btn-pause hidden">Pause</button>
    </div>
  </header>

  <nav id="tabs" class="hidden">
    <button class="tab active" data-tab="timeline">Timeline</button>
    <button class="tab" data-tab="test-steps">Step editor</button>
    <button id="reset-btn" class="tab-action hidden" title="Undo edits and restore original steps">↺ Reset Edits</button>
  </nav>

  <main id="tab-timeline" class="tab-content active">
    <ul id="action-list" aria-label="Captured actions"></ul>
    <div id="empty-msg" class="empty-terminal" role="status">
      <div class="empty-cta" aria-hidden="true">
        <span class="cta-arrow">↑</span>
        <span class="cta-text">Click <b>Start recording</b> to begin</span>
      </div>

      <p class="empty-prompt">
        <span class="prompt-arrow">&gt;</span><span class="prompt-cmd">page-rec --help</span>
      </p>

      <p class="empty-desc">
        Capture clicks, typing &amp; navigation on any
        <code>https://</code> page — export as a runnable Playwright test.
      </p>

      <ol class="empty-steps" aria-label="Three-step workflow">
        <li><span class="step-num step-num-1">01</span><span class="step-label">Start recording</span></li>
        <li><span class="step-num step-num-2">02</span><span class="step-label">Interact with the page</span></li>
        <li><span class="step-num step-num-3">03</span><span class="step-label">Stop → Copy / Download</span></li>
      </ol>

      <p class="empty-cursor" aria-hidden="true">
        <span class="prompt-arrow">&gt;</span><span class="cursor-blink">_</span>
      </p>
    </div>
  </main>

  <main id="tab-test-steps" class="tab-content">
    <ol id="steps-list"></ol>
  </main>

  <footer id="footer-edit" class="hidden">
    <div class="footer-row">
      <button id="copy-code-btn" class="btn-primary">Copy Code</button>
      <button id="download-spec-btn" class="btn-icon" title="Download Playwright .spec.js file" aria-label="Download .spec.js"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v12m0 0l-5-5m5 5l5-5M4 20h16"/></svg>.spec.js</button>
    </div>
  </footer>

  <div id="toast" class="toast hidden">Copied!</div>

  <script src="export.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
